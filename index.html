<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой сайт | Основной домен</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2em;
        }
        
        .name {
            font-size: 1.5em;
            color: #f5576c;
            margin: 20px 0;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
        }
        
        .domain {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            color: #1565c0;
        }
        
        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 0.9em;
        }
        
        .note {
            margin-top: 15px;
            font-size: 0.85em;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Основной сайт</h1>
        <div class="name">
            Сайт создан <strong>Зокиров ф.</strong>
        </div>
        <div class="domain">
            🌍 Домен: my-site.example.com
        </div>
        <div class="footer">
            © 2026 | Основной домен
        </div>
        <div class="note">
            (замените my-site.example.com на ваш реальный домен)
        </div>
    </div>
</body>
</html>
